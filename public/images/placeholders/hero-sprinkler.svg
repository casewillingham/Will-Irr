<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="North Texas lawn and irrigation">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA3D9"/>
      <stop offset="55%" stop-color="#8EC5E8"/>
      <stop offset="100%" stop-color="#C8E0D0"/>
    </linearGradient>
    <linearGradient id="lawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA84A"/>
      <stop offset="100%" stop-color="#3D6B2E"/>
    </linearGradient>
    <linearGradient id="spray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <ellipse cx="1500" cy="180" rx="220" ry="90" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="1580" cy="160" rx="140" ry="60" fill="rgba(255,255,255,0.28)"/>
  <path d="M0 620 C320 540 640 700 960 620 C1280 540 1600 680 1920 600 L1920 1080 L0 1080 Z" fill="url(#lawn)"/>
  <path d="M0 760 C400 700 800 820 1200 740 C1500 680 1700 780 1920 720 L1920 1080 L0 1080 Z" fill="#2F5A28" opacity="0.55"/>
  <!-- sprinkler spray arcs -->
  <g opacity="0.55" stroke="url(#spray)" stroke-width="3" fill="none">
    <path d="M620 700 Q780 420 980 700"/>
    <path d="M640 700 Q800 460 1020 720"/>
    <path d="M600 700 Q740 480 940 730"/>
  </g>
  <circle cx="620" cy="710" r="10" fill="#2164A2"/>
  <circle cx="1180" cy="690" r="8" fill="#2164A2" opacity="0.85"/>
  <g opacity="0.5" stroke="url(#spray)" stroke-width="2.5" fill="none">
    <path d="M1180 690 Q1320 450 1480 700"/>
    <path d="M1170 690 Q1280 480 1440 710"/>
  </g>
</svg>
